# tbump configuration for pfb-imaging
# See https://github.com/your-tools/tbump for usage

github_url = "https://github.com/ratt-ru/pfb-imaging/"

[version]
current = "0.0.8"

# Example of a semver regexp.
# Make sure this matches current_version before using tbump.
regex = '''
  (?P<major>\d+)
  \.
  (?P<minor>\d+)
  \.
  (?P<patch>\d+)
  '''

[git]
message_template = "Bump to {new_version}"
tag_template = "v{new_version}"

# before_commit hooks run before tbump's version-bump commit.
# Update the `container-image` entry in pyproject.toml and regenerate cabs with the release version.
[[before_commit]]
name = "Update container image tag to release version"
cmd = "python -c \"import re; p = 'pyproject.toml'; t = open(p).read(); t = re.sub(r'(container-image\\s*=\\s*\\\".*:)[^\\\"]+', r'\\g<1>{new_version}', t); open(p, 'w').write(t)\""

[[before_commit]]
name = "Sync environment to refresh package metadata"
cmd = "uv sync"

[[before_commit]]
name = "Regenerate cab definitions with release version"
cmd = "hip-cargo generate-cabs --module 'src/pfb_imaging/cli/*.py' --output-dir src/pfb_imaging/cabs"

[[before_commit]]
name = "Stage updated cab definitions"
cmd = "git add src/pfb_imaging/cabs/*.yml"

[[before_commit]]
name = "Stage pyproject.toml with updated container image tag"
cmd = "git add pyproject.toml"

[[before_commit]]
name = "Update uv.lock"
cmd = "uv lock"

[[before_commit]]
name = "Stage uv.lock"
cmd = "git add uv.lock"

# Files to update with the new version
[[file]]
src = "pyproject.toml"
search = 'version = "{current_version}"'

[[file]]
src = "src/pfb_imaging/__init__.py"
search = '__version__ = "{current_version}"'
