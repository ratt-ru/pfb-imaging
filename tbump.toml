# tbump configuration for pfb-imaging
# See https://github.com/your-tools/tbump for usage

[version]
current = "0.0.9"

# Version format: PEP 440 with optional pre-release and post-release
regex = '''
  (?P<major>\d+)
  \.
  (?P<minor>\d+)
  \.
  (?P<patch>\d+)
  (?:
    (?P<channel>a|b|rc)
    (?P<release>\d+)
  )?
  (?:
    \.post
    (?P<post>\d+)
  )?
  '''

[[field]]
name = "channel"
default = ""

[[field]]
name = "release"
default = ""

[[field]]
name = "post"
default = ""

[git]
message_template = "chore: bump version to {new_version}"
tag_template = "v{new_version}"

# before_commit hooks run before tbump's version-bump commit.
# Generate changelog, update container image tag, and regenerate cabs with the release version.
[[before_commit]]
name = "Generate changelog"
cmd = "uvx git-cliff --tag v{new_version} -o CHANGELOG.md"

[[before_commit]]
name = "Stage changelog"
cmd = "git add CHANGELOG.md"

[[before_commit]]
name = "Update container image tag to release version"
cmd = "python -c \"import re; p = 'src/pfb_imaging/_container_image.py'; t = open(p).read(); t = re.sub(r'(CONTAINER_IMAGE\\s*=\\s*\\\".*:)[^\\\"]+', r'\\g<1>{new_version}', t); open(p, 'w').write(t)\""

[[before_commit]]
name = "Regenerate cab definitions with release version"
cmd = "hip-cargo generate-cabs --module 'src/pfb_imaging/cli/*.py' --output-dir src/pfb_imaging/cabs"

[[before_commit]]
name = "Stage updated cab definitions"
cmd = "git add src/pfb_imaging/cabs/*.yml"

[[before_commit]]
name = "Stage _container_image.py with updated container image tag"
cmd = "git add src/pfb_imaging/_container_image.py"

[[before_commit]]
name = "Update uv.lock"
cmd = "uv lock"

[[before_commit]]
name = "Stage uv.lock"
cmd = "git add uv.lock"

# No before_push hooks needed — sentinel file workflow removed

# Files to update with the new version
[[file]]
src = "pyproject.toml"
search = 'version = "{current_version}"'

[[file]]
src = "src/pfb_imaging/__init__.py"
search = '__version__ = "{current_version}"'
