# Uncomment this if your project is hosted on GitHub:
github_url = "https://github.com/ratt-ru/pfb-imaging/"

[version]
current = "0.0.8"

# Example of a semver regexp.
# Make sure this matches current_version before
# using tbump
regex = '''
  (?P<major>\d+)
  \.
  (?P<minor>\d+)
  \.
  (?P<patch>\d+)
  '''

[git]
message_template = "Bump to {new_version}"
tag_template = "v{new_version}"

# before_commit hooks run before tbump's version-bump commit.
# The sentinel must exist when pre-commit's generate-cabs hook fires during
# the commit, so we write it here and generate + stage the cabs upfront.
[[before_commit]]
name = "Write release version sentinel"
cmd = "python -c \"from pathlib import Path; Path('.tbump_version').write_text('{new_version}')\""

[[before_commit]]
name = "Regenerate cab definitions with release version"
cmd = "hip-cargo generate-cabs --module 'src/pfb_imaging/cli/*.py' --output-dir src/pfb_imaging/cabs"

[[before_commit]]
name = "Stage updated cab definitions"
cmd = "git add src/pfb_imaging/cabs/*.yml"

[[before_commit]]
name = "Update uv.lock"
cmd = "uv lock"

[[before_commit]]
name = "Stage uv.lock"
cmd = "git add uv.lock"

# Clean up the sentinel after the commit succeeds
[[before_push]]
name = "Remove version sentinel"
cmd = "python -c \"from pathlib import Path; p = Path('.tbump_version'); p.unlink() if p.exists() else None\""

# Files to update with the new version
[[file]]
src = "pyproject.toml"
search = 'version = "{current_version}"'
