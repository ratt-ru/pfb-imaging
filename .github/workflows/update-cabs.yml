name: Update Cab Definitions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-cabs:
    name: Update cab image tags to latest
    runs-on: ubuntu-latest
    # Prevents loops if the App or the bot pushes
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Generate Token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate_token.outputs.token }}

      - name: Regenerate cab definitions with latest tag
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/landmanbester/hip-cargo:latest \
            hip-cargo generate-cabs --module 'src/pfb_imaging/cli/*.py' --output-dir src/pfb_imaging/cabs

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet src/pfb_imaging/cabs/*.yml; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated cabs
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/pfb_imaging/cabs/*.yml
          git commit -m "chore: update cab image tags to latest [skip ci]"
          git push
