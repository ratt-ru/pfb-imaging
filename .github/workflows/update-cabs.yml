name: Update Cab Definitions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-cabs:
    name: Update cab image tags to latest
    runs-on: ubuntu-latest
    # Prevents loops if the App or the bot pushes
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip checks]')

    steps:
      - name: Generate Token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate_token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync

      - name: Update container image tag to latest in pyproject.toml
        run: |
          python -c "
          import re
          p = 'pyproject.toml'
          t = open(p).read()
          t = re.sub(r'(container-image\s*=\s*\".*:)[^\"]+', r'\g<1>latest', t)
          open(p, 'w').write(t)
          "

      - name: Sync environment to refresh package metadata
        run: uv sync

      - name: Regenerate cab definitions with latest tag
        run: |
          uv run hip-cargo generate-cabs --module 'src/pfb_imaging/cli/*.py' \
                                         --output-dir src/pfb_imaging/cabs

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet src/pfb_imaging/cabs/*.yml pyproject.toml uv.lock; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated cabs
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pfb_imaging/cabs/*.yml pyproject.toml uv.lock
          git commit -m "chore: update cab definitions [skip checks]"
          git push
