name: pfb-imaging CI Workflow

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check for skip checks
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          MSG=$(gh api repos/${{ github.repository }}/commits/$COMMIT_SHA --jq '.commit.message')
          if echo "$MSG" | grep -qF '[skip checks]'; then
            echo "SKIP_CHECKS=true" >> "$GITHUB_ENV"
            echo "Skipping checks because [skip checks] was found in the commit message."
          fi

      - name: Check out code
        if: env.SKIP_CHECKS != 'true'
        uses: actions/checkout@v7

      - name: Set up Python
        if: env.SKIP_CHECKS != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        if: env.SKIP_CHECKS != 'true'
        uses: astral-sh/setup-uv@v7

      - name: Cache uv dependencies
        if: env.SKIP_CHECKS != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        if: env.SKIP_CHECKS != 'true'
        run: uv sync --group dev

      - name: Check code formatting
        if: env.SKIP_CHECKS != 'true'
        run: uv run ruff format --check .

      - name: Lint code
        if: env.SKIP_CHECKS != 'true'
        run: uv run ruff check .

  test:
    name: Tests
    runs-on: ubuntu-latest

    env:
      NUMBA_CACHE_DIR: /tmp/numba-cache

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check for skip checks
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          MSG=$(gh api repos/${{ github.repository }}/commits/$COMMIT_SHA --jq '.commit.message')
          if echo "$MSG" | grep -qF '[skip checks]'; then
            echo "SKIP_CHECKS=true" >> "$GITHUB_ENV"
            echo "Skipping checks because [skip checks] was found in the commit message."
          fi

      - name: Check out code
        if: env.SKIP_CHECKS != 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        if: env.SKIP_CHECKS != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        if: env.SKIP_CHECKS != 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          # This ensures the venv is created and ready before the test step
          activate-environment: true

      - name: Restore repo times
        if: env.SKIP_CHECKS != 'true'
        uses: chetan/git-restore-mtime-action@v2

      - name: Create Key and Numba Cache Directory
        if: env.SKIP_CHECKS != 'true'
        id: numba-key
        run: |
          mkdir -p ${{ env.NUMBA_CACHE_DIR }}
          echo "timestamp=$(/bin/date -u '+%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Cache Numba Kernels
        if: env.SKIP_CHECKS != 'true'
        uses: actions/cache@v5
        with:
          key: numba-cache-${{ matrix.python-version }}-${{ steps.numba-key.outputs.timestamp }}
          restore-keys: numba-cache-${{ matrix.python-version }}-
          path: ${{ env.NUMBA_CACHE_DIR }}

      - name: Fingerprint the measures data
        if: env.SKIP_CHECKS != 'true'
        run: curl -sSI https://www.astron.nl/iers/WSRT_Measures.ztar | grep -iE 'last-modified|etag' > measures_dir.txt

      - name: Load cached CASA Measures Data
        if: env.SKIP_CHECKS != 'true'
        id: load-cached-casa-measures
        uses: actions/cache@v5
        with:
          key: casa-measures-${{ hashFiles('measures_dir.txt')}}
          path: |
            ~/measures
            ~/.casarc

      - name: Download and install CASA Measures Data
        if: env.SKIP_CHECKS != 'true' && steps.load-cached-casa-measures.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/measures
          set -e
          for i in {1..3}; do
            if curl -L https://www.astron.nl/iers/WSRT_Measures.ztar --output WSRT_Measures.ztar; then
              break
            elif [ $i -eq 3 ]; then
              echo "Download failed after 3 attempts."; exit 1
            else
              echo "Retrying download..."; sleep 5
            fi
          done
          tar xvzf WSRT_Measures.ztar -C ~/measures
          echo "measures.directory: ~/measures" > ~/.casarc

      - name: Install pfb-imaging
        if: env.SKIP_CHECKS != 'true'
        run: uv sync --extra full --group dev --group test --frozen

      - name: Run pfb-imaging
        if: env.SKIP_CHECKS != 'true'
        run: uv run pfb --help

      # MSv4 (arcae) and MSv2 (daskms/python-casacore) cannot share a process
      # — both link to incompatible casacore builds and segfault when used
      # together (see arcae#72). Run each in its own pytest invocation so the
      # interpreter only ever loads one of the two stacks.
      - name: Run tests (MSv4 / arcae)
        if: env.SKIP_CHECKS != 'true'
        run: |
          export RAY_NUM_CPUS=2
          export XLA_PYTHON_CLIENT_MEM_FRACTION=0.50
          export OMP_NUM_THREADS=1
          export MKL_NUM_THREADS=1
          export OPENBLAS_NUM_THREADS=1
          export NUMEXPR_NUM_THREADS=1

          uv run --frozen pytest -v tests/test_imager.py

      - name: Run tests (MSv2 / daskms)
        if: env.SKIP_CHECKS != 'true'
        run: |
          export RAY_NUM_CPUS=2
          export XLA_PYTHON_CLIENT_MEM_FRACTION=0.50
          export OMP_NUM_THREADS=1
          export MKL_NUM_THREADS=1
          export OPENBLAS_NUM_THREADS=1
          export NUMEXPR_NUM_THREADS=1

          uv run --frozen pytest -v tests/ --ignore=tests/test_imager.py
