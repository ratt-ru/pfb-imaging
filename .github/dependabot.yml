version: 2
updates:
  # Monitor Python dependencies (uses uv under the hood; updates pyproject.toml + uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
    groups:
      # Batch all minor/patch bumps (direct + transitive) into a single weekly PR
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
      # Major bumps stay individual so each can be reviewed on its own
      python-major:
        update-types:
          - "major"

  # Monitor GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
