_include:
  - (pfb_imaging.cabs)cabs.yml

opts:
  log:
    dir: logs/log-{config.run.datetime}
    name: log-{info.fqname}
    nest: 2
  backend:
    select: native

gospotless:
  name: go-spotless
  info:
    Stimela recipe for the deconvolution interface.
    This uses the the new imager+deconv track to test reproduce the SARA algorithm.
    Mainly for testing purposes at the moment.

  inputs:
    ms:
      dtype: List[URI]
      required: true
    base-dir:
      dtype: Directory
      required: true
      mkdir: true
      info:
        Base output directory in which to place all output data products.
    image-name:
      dtype: str
      required: true
      info:
        A descriptive name for the outputs to be placed in base-dir.
    data-column:
      dtype: str
      default: DATA
      info:
        Column to image.
        Simple arithmatic is supported e.g. one can use CORRECTED_DATA-MODEL_DATA to image residuals.
    model-column:
      dtype: str
      default: MODEL_DATA
      info:
        Column to write model visibilities to
    weight-column:
      dtype: str
      info:
        Weight column
    sigma-column:
      dtype: str
      info:
        Sigma column (preferred over weight-column if provided)
    field-names:
      dtype: List[str]
      info:
        List of fields to image
    spw-names:
      dtype: List[str]
      info:
        List of spectral windows to image
    scan-names:
      dtype: List[str]
    gains:
      dtype: List[URI]
      info:
        Gain tables to apply (must match the order in which MS's are passed in)
    robustness:
      dtype: float
      default: -0.3
      info:
        Briggs robustness level.
        Less than -2 corresponds to uniform, larger than 2 or None to natural.
    field-of-view:
      dtype: float
      default: 1.8
    super-resolution-factor:
      dtype: float
      default: 2.0
      info:
        How much to oversample Nyquist by at the highest frequency.
    psf-oversize:
      dtype: float
      default: 1.6
      info:
        Relative size of the PSF compared to the image.
    cell-size:
      dtype: float
      info:
        Cell size in arcseconds.
        Preferred over fov and srf if set.
    nx:
      dtype: int
      info:
        Number of pixels in x direction.
    ny:
      dtype: int
      info:
        Number of pixels in y direction.
    channels-per-image:
      dtype: int
      default: 128
      info:
        Number of channels to combine into an imaging band
    integrations-per-image:
      dtype: int
      default: -1
      info:
        Number of time integrations per dataset
    rmsfactor:
      dtype: float
      default: 1.0
      info:
        Multiple of the rms to threshold by
    chan-average:
      dtype: int
      default: 4
      info:
        How many channels to average together
    freq-range:
      dtype: str
      info:
        Channel range to image passed as a numpy slice.
    bda-decorr:
      dtype: float
      default: 0.98
      info:
        Amount of amplitude loss that can be tolerated at edge of field
    niter:
      dtype: int
      default: 15
      info:
        Number of major cycles
    l1-reweight-from:
      dtype: int
      default: 7
    l2-reweight-dof:
      dtype: float
    alpha:
      dtype: float
      default: 2.0
      info:
        Alpha parameter for the l1 reweighting
    overwrite:
      default: false
      aliases: ['*.overwrite']
    output-filename:
      default: '{recipe.base-dir}/{recipe.image-name}'
      aliases: ['*.output-filename']
    # fits-output-folder:
    #   default: '{recipe.base-dir}/fits'
    #   aliases: ['*.fits-output-folder']
    # log-directory:
    #   default: '{recipe.base-dir}/logs'
    #   aliases: ['*.log-directory']
    transfer-model-from:
      dtype: str
      info:
        Model to start from
    nworkers:
      dtype: int
      required: true
      info:
        Number of workers.
        This controls the level of horizontal scaling.
        More workers mean a larger memory footprint.
        Set to the expected number of imaging bands if unsure.
    nthreads:
      dtype: int
      required: true
      info:
        Number of threads per worker.
        This controls the degree of vertical parallelism.
        The total number of threads used will be nworkers * nthreads.
    product:
      default: I
      aliases: ['*.product']
      info:
        Imaging products to produce.
    wgt-mode:
      default: minvar
      info:
        Weighting mode to use in gridder.
        Options are 'minvar' or 'l2'.
    hess-norm:
      dtype: float
      info:
        Normalisation factor for the Hessian approximation.
        This is used to regularise the inversion of the Hessian approximation.
    minor-cycle:
      info:
        Which minor cycle algorithm to use.
      choices:
      - sara
      - ista
      default: sara
    opt-backend:
      info:
        Optimization backend for the inner backward step.
      choices:
      - primal-dual
      - forward-backward
      default: primal-dual

  steps:
    initialize:
      cab: pfb.image
      info: Initialise imaging data products
      params:
        ms: =recipe.ms
        gain-table: =IFSET(recipe.gains)
        nthreads: =recipe.nthreads
        nworkers: =recipe.nworkers
        data-column: =recipe.data-column
        weight-column: =IFSET(recipe.weight-column)
        sigma-column: =IFSET(recipe.sigma-column)
        channels-per-image: =recipe.channels-per-image
        integrations-per-image: =recipe.integrations-per-image
        chan-average: =recipe.chan-average
        max-field-of-view: =recipe.field-of-view
        bda-decorr: =recipe.bda-decorr
        freq-range: =IFSET(recipe.freq-range)
        overwrite: =recipe.overwrite
        field-names: =IFSET(recipe.field-names)
        scan-names: =IFSET(recipe.scan-names)
        product: =recipe.product
        wgt-mode: =recipe.wgt-mode
        super-resolution-factor: =IFSET(recipe.super-resolution-factor)
        field-of-view: =IFSET(recipe.field-of-view)
        cell-size: =IFSET(recipe.cell-size)
        nx: =IFSET(recipe.nx)
        ny: =IFSET(recipe.ny)
        robustness: =recipe.robustness
        psf-oversize: =recipe.psf-oversize
      skip_if_outputs: exist

    deconvolve:
      cab: pfb.deconv
      info: Deconvolve with your favourite algorithm
      params:
        niter: =recipe.niter
        bases: 'self,db1,db2,db3'
        nlevels: 2
        l1-reweight-from: =recipe.l1-reweight-from
        pd-tol: 1.5e-4
        pd-maxit: 450
        pd-verbose: 1
        pd-report-freq: 50
        tol: 5e-4
        gamma: 0.99
        rmsfactor: =recipe.rmsfactor
        alpha: =recipe.alpha
        eta: 5e-4
        positivity: =IF( recipe.product == 'I', 1, 0)
        nworkers: =recipe.nworkers
        nthreads: =recipe.nthreads
        init-factor: =IFSET(recipe.transfer-model-from, 1.0, 0.5)
        hess-norm: =IFSET(recipe.hess-norm)
        minor-cycle: =recipe.minor-cycle
        opt-backend: =recipe.opt-backend
