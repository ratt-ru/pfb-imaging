cabs:
  imager:
    flavour: python
    command: pfb_imaging.core.imager.imager
    name: imager
    info:
      Initialise Stokes data products.
    image: ghcr.io/ratt-ru/pfb-imaging:imager-rephase-and-reproject
    inputs:
      ms:
        info:
          Path to measurement set
        dtype: List[URI]
        required: true
        policies:
          positional: true
        metadata:
          rich_help_panel: Input
      output-filename:
        info:
          Basename of output
        required: true
        policies:
          positional: true
        metadata:
          rich_help_panel: Naming
      scan-names:
        info:
          List of SCAN_NUMBERS to image.
          Defaults to all.
          Input as comma separated list 0,2 if running from CLI.
        dtype: Optional[List[str]]
        metadata:
          rich_help_panel: Data Selection
      spw-names:
        info:
          List of DATA_DESC_ID's to images.
          Defaults to all.
          Input as comma separated list 0,2 if running from CLI.
        dtype: Optional[List[str]]
        metadata:
          rich_help_panel: Data Selection
      field-names:
        info:
          List of FIELD_ID's to image.
          Defaults to all.
          Input as comma separated list 0,2 if running from CLI.
        dtype: Optional[List[str]]
        metadata:
          rich_help_panel: Data Selection
      freq-range:
        info:
          Frequency range to image in Hz.
          Specify as a string with colon delimiter ('1e9:1.1e9').
        dtype: Optional[str]
        metadata:
          rich_help_panel: Data Selection
      overwrite:
        info:
          Allow overwrite of output xds
        dtype: bool
        default: false
        metadata:
          rich_help_panel: Control
      data-column:
        info:
          Data column to image.
          Must be the same across MSs.
          Simple arithmetic is supported ('CORRECTED_DATA-MODEL_DATA').
          When gains are present this column will be corrected.
        default: DATA
        metadata:
          rich_help_panel: Data Selection
      data-group:
        info:
          MSv4 data group used to resolve the 'DATA' column to its correlated_data variable.
          Also selects the field_and_source subtable.
        default: base
        metadata:
          rich_help_panel: Data Selection
      partition-columns:
        info:
          Columns to partition the MSv4 store by (xarray-ms PARTITION_SCHEMA).
          Defaults to FIELD_ID,DATA_DESC_ID,SCAN_NUMBER; other instruments may need SOURCE_ID.
          Input as a comma separated list if running from CLI.
        dtype: Optional[List[str]]
        metadata:
          rich_help_panel: Data Selection
      weight-column:
        info:
          Column containing natural weights.
          Must be the same across MSs
        dtype: Optional[str]
        metadata:
          rich_help_panel: Data Selection
      sigma-column:
        info:
          Column containing standard devations.
          Will be used to initialise natural weights if detected.
          Must be the same across MSs
        dtype: Optional[str]
        metadata:
          rich_help_panel: Data Selection
      flag-column:
        info:
          Column containing data flags.
          Must be the same across MSs
        default: FLAG
        metadata:
          rich_help_panel: Data Selection
      gain-table:
        info:
          Path to Quartical gain table containing NET gains.
          There must be a table for each MS and glob(ms) and glob(gt) should match up when running from CLI.
        dtype: Optional[List[URI]]
        metadata:
          rich_help_panel: Input
      integrations-per-image:
        info:
          Number of time integrations per image.
          Default (-1, 0, None) -> dataset per scan.
        dtype: int
        default: '-1'
        metadata:
          rich_help_panel: Imaging
      channels-per-image:
        info:
          Number of channels per image for degridding resolution.
          Any of (-1, 0, None) implies single dataset per spw.
        dtype: int
        default: '-1'
        metadata:
          rich_help_panel: Imaging
      concat-row:
        info:
          Concatenate datasets by row
        dtype: bool
        default: true
        metadata:
          rich_help_panel: Imaging
      precision:
        info:
          Gridding precision
        choices:
        - single
        - double
        default: double
        metadata:
          rich_help_panel: Imaging
      bda-decorr:
        info:
          BDA decorrelation factor.
          Only has an effect if less than one
        dtype: float
        default: 1.0
        metadata:
          rich_help_panel: Averaging
      max-field-of-view:
        info:
          The maximum field of view that will be considered.
          Used to compute decorrelation due to BDA.
        dtype: float
        default: 3.0
        metadata:
          rich_help_panel: Averaging
      beam-model:
        info:
          Beam model to use.
          Either katbeam or a MeerKAT band name.
          One of U, L, S0 or S4 initialises a BeamWizard from the meerkat-beams band cache.
        dtype: Optional[str]
        metadata:
          rich_help_panel: Input
      phase-dir:
        info:
          Rephase visibilities to this phase center.
          Should be a string in the format 'HH:MM:SS,DD:MM:SS' (note the , delimiter).
          Defaults to the barycentre of the selected fields when more than one field is selected.
        dtype: Optional[str]
        metadata:
          rich_help_panel: Imaging
      target:
        info:
          Predefined celestial objects known to astropy.
          Or a string in the format 'HH:MM:SS,DD:MM:SS' (note the , delimiter)
        dtype: Optional[str]
        metadata:
          rich_help_panel: Imaging
      chan-average:
        info:
          Average this number if channels together
        dtype: int
        default: 1
        metadata:
          rich_help_panel: Averaging
      progressbar:
        info:
          Display progress.
          Use --no-progressbar to deactivate.
        dtype: bool
        default: true
        metadata:
          rich_help_panel: Reporting
      product:
        info:
          String specifying which Stokes products to produce.
          Outputs are always be alphabetically ordered.
        default: I
        metadata:
          rich_help_panel: Data Selection
      ray-address:
        info:
          Address of the ray cluster to connect to.
          If not provided, will run locally.
        default: local
        metadata:
          rich_help_panel: Performance
      nworkers:
        info:
          Number of worker processes.
          Use with distributed scheduler.
        dtype: int
        default: 1
        metadata:
          rich_help_panel: Performance
      nthreads:
        info:
          Number of threads used to scale vertically (for FFTs and gridding).
          Each dask thread can in principle spawn this many threads.
          Will attempt to use half the available threads by default.
        dtype: Optional[int]
        metadata:
          rich_help_panel: Performance
      wgt-mode:
        info:
          Controls how the Stokes weights are computed.
          l2 -> use standard Gaussian formula.
          minvar -> use minimum between correlations (wsclean Stokes I style).
        choices:
        - l2
        - minvar
        default: l2
        metadata:
          rich_help_panel: Weighting
      weight-grouping:
        info:
          How uv counts are grouped before forming imaging weights.
          per-band-time -> each output image weighted on its own counts.
          mfs/per-time -> sum counts over bands within a time.
          per-band -> sum counts over time within a band.
        choices:
        - per-band-time
        - mfs
        - per-band
        - per-time
        default: per-band-time
        metadata:
          rich_help_panel: Weighting
      robustness:
        info:
          Briggs robustness in [-2, 2].
          Values > 2 (or None) use natural weighting.
        dtype: Optional[float]
        metadata:
          rich_help_panel: Weighting
      field-of-view:
        info:
          Field of view in degrees.
          Used to set the image size.
        dtype: Optional[float]
        metadata:
          rich_help_panel: Imaging
      super-resolution-factor:
        info:
          Pixels per resolution element relative to Nyquist.
        dtype: float
        default: 2.0
        metadata:
          rich_help_panel: Imaging
      cell-size:
        info:
          Cell size in arcseconds.
          Overrides super-resolution-factor if set.
        dtype: Optional[float]
        metadata:
          rich_help_panel: Imaging
      nx:
        info:
          Number of pixels in x.
          Computed from field-of-view if not set.
        dtype: Optional[int]
        metadata:
          rich_help_panel: Imaging
      ny:
        info:
          Number of pixels in y.
          Computed from field-of-view if not set.
        dtype: Optional[int]
        metadata:
          rich_help_panel: Imaging
      psf-oversize:
        info:
          PSF size relative to the image size.
        dtype: float
        default: 1.4
        metadata:
          rich_help_panel: Imaging
      filter-counts-level:
        info:
          Replace uv cells with counts below median/level to avoid upweighting near-empty cells.
        dtype: float
        default: 5.0
        metadata:
          rich_help_panel: Weighting
      npix-super:
        info:
          Box half-size in pixels for super-uniform weighting.
          0 -> standard uniform.
        dtype: int
        default: 0
        metadata:
          rich_help_panel: Weighting
      epsilon:
        info:
          Gridder accuracy.
        dtype: float
        default: 1.0e-07
        metadata:
          rich_help_panel: Imaging
      do-wgridding:
        info:
          Use w-gridding (recommended for wide fields).
        dtype: bool
        default: true
        metadata:
          rich_help_panel: Imaging
      double-accum:
        info:
          Use double precision accumulation when gridding.
        dtype: bool
        default: true
        metadata:
          rich_help_panel: Imaging
      keep-scratch:
        info:
          Keep the .scratch store of pass-1 averaged data for re-gridding without re-reading the MS.
        dtype: bool
        default: true
        metadata:
          rich_help_panel: Control
      fits-mfs:
        info:
          Write MFS FITS images.
        dtype: bool
        default: true
        metadata:
          rich_help_panel: Output
      fits-cubes:
        info:
          Write FITS image cubes.
        dtype: bool
        default: true
        metadata:
          rich_help_panel: Output
      psf:
        info:
          Compute the PSF data products.
          Switch off for a quicklook dirty image that skips the PSF gridding.
          A tree written without the PSF cannot be deconvolved.
        dtype: bool
        default: true
        metadata:
          rich_help_panel: Output
      beam:
        info:
          Write FITS images of the effective beam.
          The beam is always stored in the DataTree regardless of this flag.
        dtype: bool
        default: true
        metadata:
          rich_help_panel: Output
      fits-per-partition:
        info:
          Write FITS images for each data partition into a partitions subdirectory.
          Useful to sanity check field and beam orientations.
        dtype: bool
        default: false
        metadata:
          rich_help_panel: Output
      fits-output-folder:
        info:
          Directory to write FITS files to.
          Required when output is on a non-file protocol.
        dtype: Optional[Directory]
        metadata:
          rich_help_panel: Output
        must_exist: false
        mkdir: false
        path_policies:
          write_parent: true
    outputs:
      dt-out:
        dtype: Directory
        info:
          Output imaging DataTree directory.
        implicit: '{current.output-filename}_{current.product}.dt'
        must_exist: true
      log-directory:
        dtype: Directory
        info:
          Directory to write logs and performance reports to.
        must_exist: false
        mkdir: false
        path_policies:
          write_parent: true
        metadata:
          rich_help_panel: Output
      numba-cache-dir:
        dtype: Directory
        info:
          Implicit output ensuring the numba cache location is mounted.
          The cache defaults to a per-user directory under /tmp.
          Override it by setting the NUMBA_CACHE_DIR environment variable.
        implicit: '/tmp/numba-cache'
        must_exist: false
        mkdir: false
        path_policies:
          write_parent: true
      beam-cache-dir:
        dtype: Directory
        info:
          Implicit output ensuring the beam cache location is mounted.
          The cache defaults to a per-user directory under /tmp.
          Override it by setting the MBEAMS_CACHE_DIR environment variable.
        implicit: '/tmp/mbeams-cache'
        must_exist: false
        path_policies:
          write_parent: true
