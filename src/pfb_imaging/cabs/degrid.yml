cabs:
  degrid:
    flavour: python
    command: pfb_imaging.core.degrid.degrid
    name: degrid
    info:
      Degrid visibilities from model image(s) into measurement set.
      The model image needs to be in component format.
    image: ghcr.io/ratt-ru/pfb-imaging:0.0.9
    inputs:
      ms:
        info:
          Path to measurement set.
        dtype: List[URI]
        required: true
        policies:
          positional: true
        metadata:
          rich_help_panel: Input
        writable: true
      output-filename:
        info:
          Basename of output
        required: true
        policies:
          positional: true
        metadata:
          rich_help_panel: Naming
      scans:
        info:
          List of SCAN_NUMBERS to image.
          Defaults to all.
          Input as comma separated string '0,2' if running from CLI.
        dtype: Optional[List[int]]
        metadata:
          rich_help_panel: Data Selection
      ddids:
        info:
          List of DATA_DESC_ID's to images.
          Defaults to all.
          Input as comma separated string '0,2' if running from CLI.
        dtype: Optional[List[int]]
        metadata:
          rich_help_panel: Data Selection
      fields:
        info:
          List of FIELD_ID's to image.
          Defaults to all.
          Input as comma separated string '0,2' if running from CLI.
        dtype: Optional[List[int]]
        metadata:
          rich_help_panel: Data Selection
      suffix:
        info:
          Can be used to specify a custom name for the image space data products.
          This is useful for distinguishing runs with different imaging paramaters.
          For example, different image sizes of robustness factors.
        default: main
        metadata:
          rich_help_panel: Naming
      mds:
        info:
          Optional path to mds to use for degridding.
          By default mds is inferred from output-filename.
        dtype: Optional[str]
        metadata:
          rich_help_panel: Input
      model-column:
        info:
          Column to write model data to
        default: MODEL_DATA
        metadata:
          rich_help_panel: Output
      product:
        info:
          String specifying which Stokes products to produce.
          Outputs are always be alphabetically ordered.
        default: I
        metadata:
          rich_help_panel: Data Selection
      freq-range:
        info:
          Frequency range to image in Hz.
          Specify as a string with colon delimiter ('1e9:1.1e9').
        dtype: Optional[str]
        metadata:
          rich_help_panel: Data Selection
      integrations-per-image:
        info:
          Number of time integrations corresponding to each image.
          Default -1 (equivalently 0 or None) implies degrid per scan.
        dtype: int
        default: '-1'
        metadata:
          rich_help_panel: Imaging
      channels-per-image:
        info:
          Number of channels per image.
          Default (None) -> read mapping from dds.
          (-1, 0) -> one band per SPW.
        dtype: Optional[int]
        metadata:
          rich_help_panel: Imaging
      accumulate:
        info:
          Accumulate onto model column
        dtype: bool
        default: false
        metadata:
          rich_help_panel: Output
      region-file:
        info:
          A region file containing regions that need to be converted to separate measurement set columns.
          Each region in the file will end up in a separate column labelled as model-column{#}.
          The remainder of the fields goes into model-column.
        dtype: Optional[str]
        metadata:
          rich_help_panel: Input
      epsilon:
        info:
          Gridder accuracy
        dtype: float
        default: 1.0e-07
        metadata:
          rich_help_panel: WGridder
      do-wgridding:
        info:
          Perform w-correction via improved w-stacking
        dtype: bool
        default: true
        metadata:
          rich_help_panel: WGridder
      host-address:
        info:
          Address where the distributed client lives.
          Uses LocalCluster if no address is provided.
        dtype: Optional[str]
        metadata:
          rich_help_panel: Distribution
      nworkers:
        info:
          Number of worker processes.
          Use with distributed scheduler.
        dtype: int
        default: 1
        metadata:
          rich_help_panel: Performance
      nthreads:
        info:
          Number of threads used to scale vertically (for FFTs and gridding).
          Each dask thread can in principle spawn this many threads.
          Will attempt to use half the available threads by default.
        dtype: Optional[int]
        metadata:
          rich_help_panel: Performance
    outputs:
      log-directory:
        dtype: Directory
        info:
          Directory to write logs and performance reports to.
        mkdir: false
        path_policies:
          write_parent: true
        metadata:
          rich_help_panel: Output
