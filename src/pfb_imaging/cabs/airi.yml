cabs:
  airi:
    flavour: python
    command: pfb_imaging.core.airi.airi
    image: ghcr.io/ratt-ru/pfb-imaging:prox_op_Tariq
    name: airi
    info:
      AIRI algorithm with PFB imaging.
    policies:
      pass_missing_as_none: true
    inputs:
      output-filename:
        info:
          Basename of output.
        required: true
        policies:
          positional: true
      suffix:
        info:
          Can be used to specify a custom name for the image space data products
        default: main
      hess-norm:
        info:
          Spectral norm of hessian approximation
        dtype: float
        abbreviation: hess-norm
      hess-approx:
        info:
          Which Hessian approximation to use.
          wgt -> vis space approximation.
          psf -> for zero-padded image space approximation.
          direct -> for direct inversion.
        choices:
        - wgt
        - psf
        - direct
        default: psf
      rmsfactor:
        info:
          By default will threshold by rmsfactor*rms at every iteration
        dtype: float
        default: 1.0
      eta:
        info:
          Will use eta*wsum to regularise the inversion of the Hessian approximation.
        dtype: float
        default: 1.0
      gamma:
        info:
          Step size of update
        dtype: float
        default: 1.0
      nbasisf:
        info:
          Number of basis functions to use while fitting the frequency axis.
          Default is to use the number of non-null imaging bands i.e.
          interpolation.
        dtype: int
      positivity:
        info:
          How to apply positivity constraint.
          0 -> no positivity.
          1 -> normal positivity constraint.
          2 -> strong positivity (zero all pixels if < 0 in any band).
        dtype: int
        default: 1
      niter:
        info:
          Number of iterations.
        dtype: int
        default: 10
        abbreviation: niter
      nthreads:
        info:
          Total number of threads to use.
          Defaults to half the total number available.
        dtype: int
        abbreviation: nt
      tol:
        info:
          Tolerance at which to terminate algorithm.
          Will stop when norm(x-xp)/norm(x) < tol
        dtype: float
        default: 0.0005
      diverge-count:
        info:
          Will terminate the algorithm if the rms increases this many times.
          Set to larger than niter to disable this check.
        dtype: int
        default: 5
      verbosity:
        info:
          Set to larger than 1 to report timings during residual computation
        dtype: int
        default: 1
      epsilon:
        info:
          Gridder accuracy.
        dtype: float
        default: 1.0e-07
      do-wgridding:
        info:
          Perform w-correction via improved w-stacking.
        dtype: bool
        default: true
      double-accum:
        info:
          Accumulate onto grid using double precision.
          Only has an affect when using single precision.
        dtype: bool
        default: true
      pd-tol:
        info:
          Tolreance of primal dual algorithm.
        dtype: float
        default: 0.0003
      pd-maxit:
        info:
          Maximum iterations for primal dual algorithm.
        dtype: int
        default: 450
      pd-verbose:
        info:
          Verbosity of primal dual algorithm.
          Set to > 1 for debugging, 0 for silence
        dtype: int
        default: 1
      pd-report-freq:
        info:
          Report frequency of primal dual algorithm
        dtype: int
        default: 50
      pm-tol:
        info:
          Tolreance of power method
        dtype: float
        default: 0.001
      pm-maxit:
        info:
          Maximum iterations for power method
        dtype: int
        default: 100
      pm-verbose:
        info:
          Verbosity of primal power method.
          Set to > 1 for debugging, 0 for silence
        dtype: int
        default: 1
      pm-report-freq:
        info:
          Report frequency of power method algorithm
        dtype: int
        default: 100
      cg-tol:
        info:
          Tolreance of conjugate gradient algorithm
        dtype: float
        default: 0.001
      cg-maxit:
        info:
          Maximum iterations for conjugate gradient algorithm
        dtype: int
        default: 150
      cg-verbose:
        info:
          Verbosity of conjugate gradient algorithm.
          Set to > 1 for debugging, 0 for silence
        dtype: int
        default: 1
      cg-report-freq:
        info:
          Report frequency of conjugate gradient algorithm
        dtype: int
        default: 10
      log-directory:
        info:
          Directory to write logs and performance reports to.
      product:
        info:
          String specifying which Stokes products to produce.
          Outputs are always be alphabetically ordered.
        default: I
      fits-output-folder:
        info:
          Optional path to write fits files to.
          Set to output-filename if not provided.
          The same naming conventions apply.
      fits-mfs:
        info:
          Output MFS fits files
        dtype: bool
        default: true
      fits-cubes:
        info:
          Output fits cubes
        dtype: bool
        default: true
      shelf-path:
        info:
          Path to CSV file containing the AIRI denoiser shelf.
        Format: sigma,/path/to/network.onnx
      airi-heuristic-scale:
        info:
          Scaling factor for the heuristic noise level estimation.
          Can be used to fine-tune denoiser selection.
        dtype: float
        default: 1.0
      airi-adapt-update:
        info:
          Adaptively update denoiser selection based on evolving peak estimates.
        dtype: bool
        default: true
      airi-peak-tol:
        info:
          Relative tolerance for peak variation before updating denoiser.
        dtype: float
        default: 0.1
      airi-device:
        info:
          Device to run AIRI denoisers on (cpu or cuda).
        choices:
        - cpu
        - cuda
        default: cpu
      airi-tile-size:
        info:
          Tile size for processing large images.
          If set, the image will be split into overlapping tiles of this size (inner region) for denoising.
        dtype: int
      airi-tile-margin:
        info:
          Margin (overlap) on each side of tiles.
          Full tile size is tile_size + 2*margin.
        dtype: int
        default: 32
    outputs:
      dds-out:
        dtype: Directory
        implicit: '{current.output-filename}_{current.product}_{current.suffix}.dds'
        must_exist: false
      mds-out:
        dtype: Directory
        implicit: '{current.output-filename}_{current.product}_{current.suffix}_model.mds'
        must_exist: false
