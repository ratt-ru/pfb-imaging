cabs:
  hci:
    flavour: python
    command: pfb_imaging.core.hci.hci
    image: ghcr.io/ratt-ru/pfb-imaging:typer
    name: hci
    info:
      ''
    inputs:
      ms:
        info:
          Path to measurement set
        dtype: List[URI]
        required: true
        policies:
          positional: true
      output-filename:
        info:
          Basename of output
        required: true
        policies:
          positional: true
      log-directory:
        info:
          Directory to write logs and performance reports to.
      product:
        info:
          String specifying which Stokes products to produce.
          Outputs are always be alphabetically ordered.
        default: I
      scans:
        info:
          'List of SCAN_NUMBERS to image.
          Defaults to all.
          Input as comma separated list 0,2 if running from CLI.
          Stimela dtype: List[int]'
      ddids:
        info:
          'List of DATA_DESC_ID''s to images.
          Defaults to all.
          Input as comma separated list 0,2 if running from CLI.
          Stimela dtype: List[int]'
      fields:
        info:
          'List of FIELD_ID''s to image.
          Defaults to all.
          Input as comma separated list 0,2 if running from CLI.
          Stimela dtype: List[int]'
      freq-range:
        info:
          Frequency range to image in Hz.
          Specify as a string with colon delimiter eg.
          '1e9:1.1e9'
      overwrite:
        info:
          Allow overwrite of output xds
        dtype: bool
        default: false
      transfer-model-from:
        info:
          Name of dataset to use for model initialisation
      data-column:
        info:
          Data column to image.
          Must be the same across MSs.
          Simple arithmetic is supported eg.
          'CORRECTED_DATA-MODEL_DATA'.
          When gains are present this column will be corrected.
        default: DATA
      model-column:
        info:
          Model column to subtract from corrected data column.
          Useful to avoid high time res degridding.
      weight-column:
        info:
          Column containing natural weights.
          Must be the same across MSs
      sigma-column:
        info:
          Column containing standard devations.
          Will be used to initialise natural weights if detected.
          Must be the same across MSs
      flag-column:
        info:
          Column containing data flags.
          Must be the same across MSs
        default: FLAG
      gain-table:
        info:
          Path to Quartical gain table containing NET gains.
          There must be a table for each MS and glob(ms) and glob(gt) should match up when running from CLI.
        dtype: List[URI]
      integrations-per-image:
        info:
          Number of time integrations per image.
          Default (-1, 0, None) -> dataset per scan.
        dtype: int
        default: 1
      channels-per-image:
        info:
          Number of channels per image for gridding resolution.
          Default of (-1, 0, None) implies a single dataset per spw.
        dtype: int
        default: -1
      precision:
        info:
          Gridding precision
        choices:
        - single
        - double
        default: double
      beam-model:
        info:
          Path to beam model as an xarray dataset backed by zarr
        dtype: URI
      field-of-view:
        info:
          Field of view in degrees
        dtype: float
        default: 1.0
      super-resolution-factor:
        info:
          Will over-sample Nyquist by this factor at max frequency
        dtype: float
        default: 1
      cell-size:
        info:
          Cell size in arc-seconds
        dtype: float
      nx:
        info:
          Number of x pixels
        dtype: int
      ny:
        info:
          Number of y pixels
        dtype: int
      psf-relative-size:
        info:
          Relative size of the PSF in pixels.
          A value of 1.0 means the PSF will be the same size as the image.
          The default is to make the PSF just big enough to extract the PSF parameters.
          If the natural gradient is required the PSF needs to ideally be twice the size of the image.
        dtype: float
      robustness:
        info:
          Robustness factor for Briggs weighting.
          None means natural
        dtype: float
      target:
        info:
          This can be predefined celestial objects known to astropy or a string in the format 'HH:MM:SS,DD:MM:SS' (note the , delimiter)
      l2-reweight-dof:
        info:
          The degrees of freedom parameter for L2 reweighting.
          The default (None) means no reweighting.
          A sensible value for this parameter depends on the level of RFI in the data.
          Small values (eg.
          2) result in aggressive reweighting and should be avoided if the model is still incomplete.
        dtype: float
      progressbar:
        info:
          Display progress.
          Use --no-progressbar to deactivate.
        dtype: bool
        default: true
      output-format:
        info:
          zarr or fits output
        default: zarr
      eta:
        info:
          Value to add to Hessian to make it invertible.
          Smaller values tend to fit more noise and make the inversion less stable.
        dtype: float
        default: 1.0e-05
      psf-out:
        info:
          Whether to produce output PSF's or not.
        dtype: bool
        default: false
      weight-grid-out:
        info:
          Whether to produce an image of the weighted grid or not.
        dtype: bool
        default: false
      natural-grad:
        info:
          Compute naural gradient
        dtype: bool
        default: false
      check-ants:
        info:
          Check that ANTENNA1 and ANTENNA2 tables are consistent with the ANTENNA table.
        dtype: bool
        default: false
      inject-transients:
        info:
          YAML file containing transients to inject into the data.
      filter-counts-level:
        info:
          Set minimum counts in the uniform weighting grid to the median divided by this value.
          This is useful to avoid artificially up-weighting nearly empty uv-cells.
        dtype: float
        default: 10.0
      min-padding:
        info:
          Minimum padding to be applied during gridding.
        dtype: float
        default: 2.0
      phase-dir:
        info:
          Rephase visibilities to this phase center.
          Should be a string in the format 'HH:MM:SS,DD:MM:SS' (note the , delimiter)
      stack:
        info:
          Stack everything into a single xarray dataset
        dtype: bool
        default: false
      epsilon:
        info:
          Gridder accuracy
        dtype: float
        default: 1.0e-07
      do-wgridding:
        info:
          Perform w-correction via improved w-stacking
        dtype: bool
        default: true
      double-accum:
        info:
          Accumulate onto grid using double precision.
          Only has an affect when using single precision.
        dtype: bool
        default: true
      host-address:
        info:
          Address where the distributed client lives.
          Uses LocalCluster if no address is provided and scheduler is set to distributed.
      nworkers:
        info:
          Number of worker processes.
          Use with distributed scheduler.
        dtype: int
        default: 1
      nthreads:
        info:
          Number of threads used to scale vertically (eg.
          for FFTs and gridding).
          Each dask thread can in principle spawn this many threads.
          Will attempt to use half the available threads by default.
        dtype: int
      log-level:
        choices:
        - error
        - warning
        - info
        - debug
        default: error
      cg-tol:
        info:
          Tolreance of conjugate gradient algorithm
        dtype: float
        default: 0.001
      cg-maxit:
        info:
          Maximum iterations for conjugate gradient algorithm
        dtype: int
        default: 150
      cg-minit:
        info:
          Minimum iterations for conjugate gradient algorithm
        dtype: int
        default: 10
      cg-verbose:
        info:
          Verbosity of conjugate gradient algorithm.
          Set to > 1 for debugging, 0 for silence.
        dtype: int
        default: 1
      cg-report-freq:
        info:
          Report frequency of conjugate gradient algorithm.
        dtype: int
        default: 10
      backtrack:
        info:
          Ensure residual decreases at every iteration.
        dtype: bool
        default: false
    outputs:
      dir-out:
        dtype: Directory
        info:
          ''
