cabs:
  kclean:
    flavour: python
    command: pfb_imaging.core.kclean.kclean
    name: kclean
    info:
      Modified single scale clean algorithm.
    image: ghcr.io/ratt-ru/pfb-imaging:dispatchupdatecabs
    inputs:
      output-filename:
        info:
          Basename of output
        required: true
        policies:
          positional: true
      suffix:
        info:
          Can be used to specify a custom name for the image space data products.
          This is useful for distinguishing runs with different imaging paramaters.
          For example, different image sizes of robustness factors.
        default: main
      mask:
        info:
          Path to mask.fits
      dirosion:
        info:
          Perform dilation followed by erosion with structure element of this width
        dtype: int
        default: 1
      mop-flux:
        info:
          Use PCG based flux mop.
        dtype: bool
        default: true
      mop-gamma:
        info:
          Step size for flux mop.
          Should be between (0,1).
          A value of 1 is most aggressive.
        dtype: float
        default: 0.65
      niter:
        info:
          Number of major iterations
        dtype: int
        default: 5
      nthreads:
        info:
          Total number of threads to use.
          Defaults to half the total number available.
        dtype: int
      threshold:
        info:
          Absolute threshold at which to stop cleaning.
          By default it is set automatically using rmsfactor parameter
        dtype: float
      rmsfactor:
        info:
          Multiple of the rms at which to stop cleaning
        dtype: float
        default: 3.0
      eta:
        info:
          Will use eta*wsum to regularise the inversion of the Hessian approximation.
        dtype: float
        default: 0.001
      gamma:
        info:
          Minor loop gain
        dtype: float
        default: 0.1
      peak-factor:
        info:
          Peak factor
        dtype: float
        default: 0.15
      sub-peak-factor:
        info:
          Peak factor of sub-minor loop
        dtype: float
        default: 0.75
      minor-maxit:
        info:
          Maximum number of PSF convolutions between major cycles
        dtype: int
        default: 50
      subminor-maxit:
        info:
          Maximum number of iterations for the sub-minor cycle
        dtype: int
        default: 1000
      verbose:
        info:
          Verbosity level.
          Set to 2 for maximum verbosity, 0 for silence
        dtype: int
        default: 1
      report-freq:
        info:
          Report frequency for minor cycles
        dtype: int
        default: 10
      cg-tol:
        info:
          Tolreance of conjugate gradient algorithm
        dtype: float
        default: 0.01
      cg-maxit:
        info:
          Maximum iterations for conjugate gradient algorithm
        dtype: int
        default: 100
      cg-verbose:
        info:
          Verbosity of conjugate gradient algorithm.
          Set to > 1 for debugging, 0 for silence
        dtype: int
        default: 1
      cg-report-freq:
        info:
          Report frequency of conjugate gradient algorithm
        dtype: int
        default: 100
      epsilon:
        info:
          Gridder accuracy
        dtype: float
        default: 1.0e-07
      do-wgridding:
        info:
          Perform w-correction via improved w-stacking
        dtype: bool
        default: true
      double-accum:
        info:
          Accumulate onto grid using double precision.
          Only has an affect when using single precision.
        dtype: bool
        default: true
      log-directory:
        info:
          Directory to write logs and performance reports to.
      product:
        info:
          String specifying which Stokes products to produce.
          Outputs are always be alphabetically ordered.
        default: I
      fits-output-folder:
        info:
          Optional path to write fits files to.
          Set to output-filename if not provided.
          The same naming conventions apply.
      fits-mfs:
        info:
          Output MFS fits files
        dtype: bool
        default: true
      fits-cubes:
        info:
          Output fits cubes
        dtype: bool
        default: true
    outputs:
      dds-out:
        dtype: Directory
        info:
          Output dataset directory.
        implicit: '{current.output-filename}_{current.product}_{current.suffix}.dds'
        must_exist: false
      mds-out:
        dtype: Directory
        info:
          Output component model.
        implicit: '{current.output-filename}_{current.product}_{current.suffix}.mds'
        must_exist: false
