cabs:
  model2comps:
    flavour: python
    command: pfb_imaging.core.model2comps.model2comps
    name: model2comps
    info:
      Convert model image to components.
    image: ghcr.io/ratt-ru/pfb-imaging:fixtures
    inputs:
      output-filename:
        info:
          Basename of output
        required: true
        policies:
          positional: true
        metadata:
          rich_help_panel: Naming
      overwrite:
        info:
          Allow overwrite of existing model
        dtype: bool
        default: false
        metadata:
          rich_help_panel: Control
      mds:
        info:
          An optional input model to append to the model.
          Will be rendered to the same resolution as the model in the dds.
        dtype: Optional[str]
        metadata:
          rich_help_panel: Input
      from-fits:
        info:
          An optional fits input model.
          An mds will be created that matches the model resolution.
        dtype: Optional[str]
        metadata:
          rich_help_panel: Input
      nbasisf:
        info:
          Order of interpolating polynomial for frequency axis.
          One less than the number of bands by default.
        dtype: Optional[int]
        metadata:
          rich_help_panel: Fitting
      nthreads:
        info:
          Number of threads
        dtype: Optional[int]
        metadata:
          rich_help_panel: Performance
      fit-mode:
        default: Legendre
        metadata:
          rich_help_panel: Fitting
      min-val:
        info:
          Only fit components above this flux level
        dtype: Optional[float]
        metadata:
          rich_help_panel: Fitting
      suffix:
        info:
          Can be used to specify a custom name for the image space data products.
          This is useful for distinguishing runs with different imaging paramaters.
          For example, different image sizes of robustness factors.
        default: main
        metadata:
          rich_help_panel: Naming
      model-name:
        info:
          Name of model in mds
        default: MODEL
        metadata:
          rich_help_panel: Input
      use-wsum:
        info:
          Use wsum as weights during fit
        dtype: bool
        default: true
        metadata:
          rich_help_panel: Fitting
      sigmasq:
        info:
          Multiple of the identity to add to the hessian for stability
        dtype: float
        default: 1.0e-10
        metadata:
          rich_help_panel: Fitting
      model-out:
        info:
          Optional explicit output name.
          Otherwise the default naming convention is used.
        dtype: Optional[str]
        metadata:
          rich_help_panel: Output
      out-format:
        info:
          Format to dump model to.
        choices:
        - zarr
        - json
        default: zarr
        metadata:
          rich_help_panel: Output
      out-freqs:
        info:
          A string flow:fhigh:step of frequencies in hertz where the output cube needs to be evaluated.
        dtype: Optional[str]
        metadata:
          rich_help_panel: Output
      product:
        info:
          String specifying which Stokes products to produce.
          Outputs are always be alphabetically ordered.
        default: I
        metadata:
          rich_help_panel: Data Selection
    outputs:
      mds-out:
        dtype: Directory
        info:
          Output component model.
        implicit: '=IFSET(current.model-out, current.model-out, {current.output-filename}_{current.product}_{current.suffix}_{current.model-name}.mds)'  # noqa: E501
        must_exist: false
      log-directory:
        dtype: Directory
        info:
          Directory to write logs and performance reports to.
        mkdir: false
        path_policies:
          write_parent: true
        metadata:
          rich_help_panel: Output
      fits-output-folder:
        dtype: Directory
        info:
          Optional path to write fits files to.
          Set to output-filename if not provided.
          The same naming conventions apply.
        mkdir: false
        path_policies:
          write_parent: true
        metadata:
          rich_help_panel: Output
